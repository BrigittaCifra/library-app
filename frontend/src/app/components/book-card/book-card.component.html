<div class="card">
  <div class="card-header">{{ book.title }}</div>
  <ul class="list-group list-group-flush">
    <li class="list-group-item">{{ book.author }}</li>
    <li class="list-group-item">{{ book.publishedDate }}</li>
  </ul>
  <div class="card-body d-flex gap-2">
    <button (click)="onEdit()" type="button" class="btn btn-primary">Redigera</button>
    <button (click)="bookStore.deleteBook(book.id)" type="button" class="btn btn-secondary">Radera</button>
  </div>
</div>
