<div class="card">

    <figure class="list-group list-group-flush p-3">
        <blockquote class="blockquote">
            <p>{{quote.content}}</p>
        </blockquote>
        <figcaption class="blockquote-footer mb-0 mt-0">
            <cite title="Source Title"><i class="fa-regular fa-user text-secondary me-2"></i>{{quote.author}}</cite>
        </figcaption>
    </figure>

    <div class="card-body d-flex gap-2">
        <button (click)="onEdit.emit(quote)" type="button" class="btn btn-primary"><i
                class="fa-regular fa-pen-to-square me-2"></i>Redigera</button>
        <button (click)="quoteStore.deleteQuote(quote.id)" type="button" class="btn btn-secondary"><i
                class="fa-regular fa-trash-can me-2"></i>Radera</button>
    </div>

</div>
