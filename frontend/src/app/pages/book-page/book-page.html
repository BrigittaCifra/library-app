<main class="container-lg mt-5 mb-3 d-flex gap-4 flex-column">
    <!--Hanterar loading staten-->
    @if(loading()){
    <div class="d-flex justify-content-center align-items-center" style="min-height: 50vh">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Laddar...</span>
        </div>
    </div>

    } @else {
    <!-- Länk till formuläret -->
    <a class="btn btn-primary align-self-start" role="button" routerLink="book/new"><i
            class="fa-regular fa-plus"></i>Lägg till ny bok</a>

    @if(book().length > 0){
    <p>{{book().length}} böcker hittades</p>
    }

    <div class="row gy-4">
        @if(book().length > 0){
        @for (book of book(); track book.id) {
        <div class="col-12 col-sm-6 col-md-4">
            <app-book-card [book]="book" />
        </div>
        }
        } @else {
        <p class="text-muted">Inga böcker hittades</p>
        }
    </div>

    }
</main>
