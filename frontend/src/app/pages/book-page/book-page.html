<!-- Länk till formuläret -->
<a class="btn btn-primary" role="button" routerLink="book/new">Lägg till ny bok</a>

<div>
    @for (book of books(); track book.id) {
    <!-- Kort komponent -->
    <!-- (bookDeleted) lyssnar på event som kommer från -->
    <app-book-card [book]="book" (bookDeleted)="onBookDeleted($event)" />
    }
</div>
