<!--Hanterar loading staten-->
@if(loading()){
<p>Laddar . . .</p>
} @else {

<!-- Länk till formuläret -->
<a class="btn btn-primary" role="button" routerLink="book/new">Lägg till ny bok</a>

<div class="row">
    <div class="col">
        @if(book().length > 0){
        @for (book of book(); track book.id) {
        <app-book-card [book]="book" />
        }
        } @else {
        <p>Inga böcker hittades</p>
        }
    </div>
</div>

}
