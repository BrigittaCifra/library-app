<main class="container-lg mt-5 mb-3 d-flex gap-4 flex-column">
    @if(loading()){
    <div class="d-flex justify-content-center align-items-center" style="min-height: 50vh">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Laddar...</span>
        </div>
    </div>
    }@else{

    <!--Det visas en formulär på sidan om användaren trycker på "lägg till citat"-->
    @if(showForm()){
    <div class="modal d-block" tabindex="-1" style="background: rgba(0,0,0,0.5)">
        <div class="modal-dialog">
            <form [formGroup]="quoteForm" (ngSubmit)="onSubmit()" class="modal-content">
                <!--Modal header-->
                <div class="modal-header">
                    <h2 class="modal-title">{{ newQuote() ? 'Ny citat' : 'Redigera citat' }}</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
                        (click)="cleanUp()"></button>
                </div>
                <!--Modal innehåll-->
                <div class="modal-body d-flex flex-column gap-4">
                    <div>
                        <label for=" content" class="form-label">Citat</label>
                        <textarea formControlName="content" class="form-control" aria-label="With textarea"
                            placeholder="Innehåll här..."></textarea>
                    </div>
                    <div>
                        <label for="author" class="form-label"><i
                                class="fa-regular fa-user text-secondary me-2"></i>Författare</label>
                        <input formControlName="author" type="text" class="form-control">
                    </div>
                </div>
                <!--Modal footer-->
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">{{ newQuote() ? 'Skapa' : 'Uppdatera' }}</button>
                    <button type="button" class="btn btn-secondary" (click)="onReset()">Rensa</button>
                </div>
            </form>
        </div>
    </div>
    }

    <button (click)="showForm.set(true); newQuote.set(true)" type="button" class="btn btn-primary align-self-start">
        <i class="fa-regular fa-plus"></i>Lägg till citat
    </button>

    @if(quote().length > 0){
    <p>{{quote().length}} citat hittades</p>
    }

    <div class="row gy-4">
        @if(quote().length > 0){
        @for (quote of quote(); track quote.id) {
        <!-- citat komponent -->
        <div class="col-12 col-sm-6 col-md-4">
            <app-quote-card [quote]="quote" (onEdit)="onEdit($event)" />
        </div>
        }
        } @else {
        <p>Inga citat hittades</p>
        }
    </div>
    }
</main>
