<main class="container-fluid mt-3 mb-3 d-flex justify-content-center">
    <div class="card p-4 d-flex gap-4">
        <h2>{{this.pageTitle()}}</h2>

        <form [formGroup]="bookForm" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-4">
            <div>
                <label for="title" class="form-label">Titel</label>
                <input id="title" formControlName="title" type="text" class="form-control">
            </div>
            <div>
                <label for="author" class="form-label"><i
                        class="fa-regular fa-user text-secondary me-2"></i>Författare</label>
                <input id="author" formControlName="author" type="text" class="form-control">
            </div>
            <div>
                <label for="publishedDate" class="form-label"><i
                        class="fa-regular fa-calendar text-secondary me-2"></i>Datum</label>
                <input id="publishedDate" formControlName="publishedDate" type="date" class="form-control">
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Skapa</button>
                <button type="button" class="btn btn-secondary" (click)="onReset()">Rensa</button>
            </div>
        </form>
    </div>
</main>
